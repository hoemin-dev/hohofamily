<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoHo Family Home</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="home-body">

    <main class="home-page">

        <header class="home-header">
            <div>
                <div class="home-logo">🏠 HoHo Family</div>
                <p class="home-subtitle">우리 가족의 작은 집</p>
            </div>

            <div class="home-actions">
                <button>🔔</button>
                <button>⚙️</button>
                <a href="/cdn-cgi/access/logout?returnTo=/">
                    로그아웃
                </a>
            </div>
        </header>

        <section class="welcome-panel">
            <h1>Welcome Home</h1>
            <p>오늘도 가족 소식을 함께 나눠요.</p>
        </section>

        <section class="home-card main-family-card">
            <div class="card-title-row">
                <h2>👨‍👩‍👧‍👦 전체가족</h2>
                <span>Family</span>
            </div>

            <div class="summary-grid">
                <div>
                    <strong>2</strong>
                    <span>새 글</span>
                </div>
                <div>
                    <strong>8</strong>
                    <span>새 사진</span>
                </div>
                <div>
                    <strong>1</strong>
                    <span>이번 주 생일</span>
                </div>
                <div>
                    <strong>0</strong>
                    <span>오늘 일정</span>
                </div>
            </div>
        </section>

        <section class="home-card">
            <div class="card-title-row">
                <h2>🏡 수호네</h2>
                <span>Home</span>
            </div>

            <div class="menu-grid">
                <a href="#">📅<span>일정</span></a>
                <a href="#">🩺<span>건강</span></a>
                <a href="#">✈️<span>여행</span></a>
                <a href="#">🧹<span>가사</span></a>
            </div>
        </section>

        <section class="home-card">
            <h2>Quick Menu</h2>

            <div class="quick-list">
                <a href="#">📝 가족게시판</a>
                <a href="#">📷 사진첩</a>
                <a href="#">🎂 기념일</a>
                <a href="#">📦 문서보관</a>
            </div>
        </section>

    </main>

</body>

</html>
